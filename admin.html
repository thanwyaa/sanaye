<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - أدمن منصة ثانية ثانوي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: #0f172a;
            min-height: 100vh;
        }
        .admin-header {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #3b82f6;
        }
        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-img {
            width: 45px; height: 45px;
            border-radius: 12px;
            object-fit: cover;
        }
        .logo-area h1 { color: white; font-size: 20px; }
        .logout-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
        }
        .container {
            padding: 25px 5%;
            max-width: 1400px;
            margin: 0 auto;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #1e293b;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border: 1px solid #334155;
        }
        .stat-card i { font-size: 35px; color: #3b82f6; margin-bottom: 10px; }
        .stat-card .number { font-size: 28px; font-weight: 800; color: white; }
        .stat-card .label { color: #94a3b8; font-size: 14px; }
        
        .admin-tabs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }
        .admin-tab {
            background: #1e293b;
            color: #94a3b8;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
        }
        .admin-tab.active {
            background: #3b82f6;
            color: white;
        }
        .admin-pane { display: none; }
        .admin-pane.active { display: block; }
        
        .card {
            background: #1e293b;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid #334155;
        }
        .card h3 {
            color: white;
            margin-bottom: 20px;
            font-size: 18px;
            border-right: 3px solid #3b82f6;
            padding-right: 12px;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 12px;
            border: 1px solid #334155;
            border-radius: 12px;
            background: #0f172a;
            color: white;
            font-family: 'Cairo', sans-serif;
        }
        input:focus, select:focus { outline: none; border-color: #3b82f6; }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
        }
        button.danger { background: #dc2626; }
        button.warning { background: #f59e0b; }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: right;
            border-bottom: 1px solid #334155;
            color: #cbd5e1;
        }
        th { color: #3b82f6; }
        .book-item, .room-item, .user-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #334155;
        }
        .book-title, .room-name, .user-name { color: white; font-weight: 600; }
        .actions { display: flex; gap: 8px; }
        .actions button { padding: 5px 12px; font-size: 12px; }
        
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #1e293b;
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
        }
        .modal-content h3 { color: white; margin-bottom: 20px; }
        
        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .admin-tab { padding: 8px 16px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <div class="admin-header">
        <div class="logo-area">
            <img src="https://videotourl.com/images/1778390932765-44a348ea-5376-4709-8a60-652399630ae0.jpg" alt="شعار المنصة" class="logo-img">
            <h1>👑 لوحة تحكم الأدمن - منصة ثانية ثانوي</h1>
        </div>
        <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> خروج</button>
    </div>

    <div class="container">
        <!-- الإحصائيات -->
        <div class="stats-grid">
            <div class="stat-card"><i class="fas fa-users"></i><div class="number" id="usersCount">0</div><div class="label">طلاب مسجلين</div></div>
            <div class="stat-card"><i class="fas fa-book"></i><div class="number" id="booksCount">0</div><div class="label">كتب</div></div>
            <div class="stat-card"><i class="fas fa-door-open"></i><div class="number" id="roomsCount">0</div><div class="label">غرف نشطة</div></div>
            <div class="stat-card"><i class="fas fa-download"></i><div class="number" id="totalDownloads">0</div><div class="label">إجمالي التحميلات</div></div>
        </div>

        <!-- التبويبات -->
        <div class="admin-tabs">
            <button class="admin-tab active" data-pane="books">📚 إدارة الكتب</button>
            <button class="admin-tab" data-pane="rooms">🎧 إدارة الغرف</button>
            <button class="admin-tab" data-pane="users">👥 إدارة الطلاب</button>
        </div>

        <!-- كتب -->
        <div id="booksPane" class="admin-pane active">
            <div class="card">
                <h3><i class="fas fa-plus-circle"></i> إضافة كتاب جديد</h3>
                <input type="text" id="bookTitle" placeholder="عنوان الكتاب">
                <input type="text" id="bookUrl" placeholder="رابط التحميل (PDF)">
                <input type="text" id="bookCategory" placeholder="التصنيف (مثل: كتب مدرسية / خارجية / مراجعات)">
                <input type="text" id="bookSubCategory" placeholder="القسم الفرعي (مثل: عربي / فيزياء)">
                <input type="text" id="bookIcon" placeholder="أيقونة (fa-book, fa-flask, fa-calculator)">
                <button id="addBookBtn"><i class="fas fa-save"></i> نشر الكتاب</button>
            </div>
            <div class="card">
                <h3><i class="fas fa-list"></i> قائمة الكتب</h3>
                <div id="booksList"></div>
            </div>
        </div>

        <!-- غرف -->
        <div id="roomsPane" class="admin-pane">
            <div class="card">
                <h3><i class="fas fa-door-closed"></i> الغرف النشطة</h3>
                <div id="roomsList"></div>
            </div>
            <div class="card">
                <h3><i class="fas fa-history"></i> سجل الغرف المغلقة</h3>
                <div id="closedRoomsList"></div>
            </div>
        </div>

        <!-- طلاب -->
        <div id="usersPane" class="admin-pane">
            <div class="card">
                <h3><i class="fas fa-user-slash"></i> إدارة الطلاب (حظر / فك حظر)</h3>
                <div id="usersList"></div>
            </div>
        </div>
    </div>

    <!-- مودال مشاهدة الغرفة في وضع متخفي -->
    <div id="stealthModal" class="modal">
        <div class="modal-content">
            <h3>🕵️ وضع المتخفي</h3>
            <p id="stealthRoomName"></p>
            <button id="confirmStealth">دخول الوضع المتخفي</button>
            <button id="closeStealthModal" style="background:#64748b; margin-top:10px;">إلغاء</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc, updateDoc, onSnapshot, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB3Z8iHqNNfWEWrwIfP15x3hlh65GEZ0mQ",
            authDomain: "sanaayee.firebaseapp.com",
            databaseURL: "https://sanaayee-default-rtdb.firebaseio.com",
            projectId: "sanaayee",
            storageBucket: "sanaayee.firebasestorage.app",
            messagingSenderId: "1048456368002",
            appId: "1:1048456368002:web:e37c8e2b7ebba18ef2499b",
            measurementId: "G-XCYY1H22CQ"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            currentUser = user;
            // التحقق من صلاحيات الأدمن
            const userDoc = await getDocs(collection(db, "users"));
            let isAdmin = false;
            userDoc.forEach(doc => {
                if (doc.id === user.uid && doc.data().isAdmin === true) isAdmin = true;
            });
            if (!isAdmin) {
                await signOut(auth);
                window.location.href = 'index.html';
                return;
            }
            loadStats();
            loadBooks();
            loadRooms();
            loadUsers();
        });

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await signOut(auth);
            window.location.href = 'index.html';
        });

        // التبويبات
        document.querySelectorAll('.admin-tab').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.admin-tab').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.admin-pane').forEach(pane => pane.classList.remove('active'));
                document.getElementById(btn.dataset.pane + 'Pane').classList.add('active');
            });
        });

        async function loadStats() {
            const booksSnap = await getDocs(collection(db, "books"));
            const usersSnap = await getDocs(collection(db, "users"));
            const roomsSnap = await getDocs(query(collection(db, "rooms"), where("isActive", "==", true)));
            let totalDownloads = 0;
            booksSnap.forEach(doc => totalDownloads += (doc.data().downloads || 0));
            document.getElementById('usersCount').innerText = usersSnap.size;
            document.getElementById('booksCount').innerText = booksSnap.size;
            document.getElementById('roomsCount').innerText = roomsSnap.size;
            document.getElementById('totalDownloads').innerText = totalDownloads;
        }

        // إدارة الكتب
        async function loadBooks() {
            const booksSnap = await getDocs(query(collection(db, "books"), orderBy("downloads", "desc")));
            const div = document.getElementById('booksList');
            if (booksSnap.empty) {
                div.innerHTML = '<div style="color:#94a3b8; text-align:center;">لا توجد كتب بعد</div>';
                return;
            }
            div.innerHTML = '';
            booksSnap.forEach(doc => {
                const book = doc.data();
                div.innerHTML += `
                    <div class="book-item">
                        <div><div class="book-title">${book.title}</div><small style="color:#64748b;">${book.category} - 📥 ${book.downloads || 0}</small></div>
                        <div class="actions">
                            <button class="delete-book" data-id="${doc.id}">🗑️ حذف</button>
                        </div>
                    </div>
                `;
            });
            document.querySelectorAll('.delete-book').forEach(btn => {
                btn.addEventListener('click', async () => {
                    if (confirm('هل أنت متأكد من حذف هذا الكتاب؟')) {
                        await deleteDoc(doc(db, "books", btn.dataset.id));
                        loadBooks();
                        loadStats();
                    }
                });
            });
        }

        document.getElementById('addBookBtn').addEventListener('click', async () => {
            const title = document.getElementById('bookTitle').value;
            const url = document.getElementById('bookUrl').value;
            const category = document.getElementById('bookCategory').value || 'كتب';
            const subCategory = document.getElementById('bookSubCategory').value || 'كتاب مدرسي';
            const icon = document.getElementById('bookIcon').value || 'fa-book';
            if (!title || !url) {
                alert('الرجاء إدخال عنوان الكتاب ورابط التحميل');
                return;
            }
            await addDoc(collection(db, "books"), {
                title, url, category, subcategory: subCategory, icon,
                downloads: 0, createdAt: new Date().toISOString()
            });
            document.getElementById('bookTitle').value = '';
            document.getElementById('bookUrl').value = '';
            document.getElementById('bookCategory').value = '';
            document.getElementById('bookSubCategory').value = '';
            document.getElementById('bookIcon').value = '';
            loadBooks();
            loadStats();
            alert('✅ تم نشر الكتاب بنجاح');
        });

        // إدارة الغرف
        function loadRooms() {
            const roomsQuery = query(collection(db, "rooms"), where("isActive", "==", true));
            onSnapshot(roomsQuery, (snapshot) => {
                const div = document.getElementById('roomsList');
                if (snapshot.empty) {
                    div.innerHTML = '<div style="color:#94a3b8; text-align:center;">لا توجد غرف نشطة</div>';
                } else {
                    div.innerHTML = '';
                    snapshot.forEach(doc => {
                        const room = doc.data();
                        div.innerHTML += `
                            <div class="room-item">
                                <div><div class="room-name">${room.name}</div><small style="color:#64748b;">${room.type} - 👤 ${room.createdBy}</small></div>
                                <div class="actions">
                                    <button class="stealth-room" data-id="${doc.id}" data-name="${room.name}">🕵️ دخول متخفي</button>
                                    <button class="close-room" data-id="${doc.id}" style="background:#f59e0b;">🔒 إغلاق الغرفة</button>
                                    <button class="delete-room" data-id="${doc.id}" style="background:#dc2626;">🗑️ حذف</button>
                                </div>
                            </div>
                        `;
                    });
                    document.querySelectorAll('.stealth-room').forEach(btn => {
                        btn.addEventListener('click', () => {
                            document.getElementById('stealthRoomName').innerText = `دخول متخفي إلى: ${btn.dataset.name}`;
                            document.getElementById('stealthModal').style.display = 'flex';
                            document.getElementById('confirmStealth').onclick = () => {
                                alert(`🕵️ تم الدخول في وضع المتخفي إلى الغرفة: ${btn.dataset.name}\n(لن يظهر اسمك للمشاركين)`);
                                document.getElementById('stealthModal').style.display = 'none';
                            };
                        });
                    });
                    document.querySelectorAll('.close-room').forEach(btn => {
                        btn.addEventListener('click', async () => {
                            if (confirm('إغلاق هذه الغرفة؟')) {
                                await updateDoc(doc(db, "rooms", btn.dataset.id), { isActive: false });
                                loadRooms();
                                loadStats();
                            }
                        });
                    });
                    document.querySelectorAll('.delete-room').forEach(btn => {
                        btn.addEventListener('click', async () => {
                            if (confirm('حذف هذه الغرفة نهائياً؟')) {
                                await deleteDoc(doc(db, "rooms", btn.dataset.id));
                                loadRooms();
                                loadStats();
                            }
                        });
                    });
                }
            });
        }

        // إدارة المستخدمين
        async function loadUsers() {
            const usersSnap = await getDocs(collection(db, "users"));
            const div = document.getElementById('usersList');
            div.innerHTML = '<table><tr><th>الاسم</th><th>البريد</th><th>الجنس</th><th>الشعبة</th><th>الحالة</th><th>إجراء</th></tr>';
            usersSnap.forEach(doc => {
                const user = doc.data();
                div.innerHTML += `
                    <tr>
                        <td>${user.name}</td>
                        <td>${user.email}</td>
                        <td>${user.gender}</td>
                        <td>${user.section || '-'}</td>
                        <td>${user.isBanned ? '🚫 محظور' : '✅ نشط'}</td>
                        <td>
                            ${!user.isBanned ? `<button class="ban-user" data-id="${doc.id}" style="background:#dc2626;padding:5px 12px;">حظر</button>` : `<button class="unban-user" data-id="${doc.id}" style="background:#10b981;padding:5px 12px;">فك الحظر</button>`}
                        </td>
                    </tr>
                `;
            });
            div.innerHTML += '</table>';
            document.querySelectorAll('.ban-user').forEach(btn => {
                btn.addEventListener('click', async () => {
                    if (confirm('حظر هذا الطالب؟')) {
                        await updateDoc(doc(db, "users", btn.dataset.id), { isBanned: true });
                        loadUsers();
                        loadStats();
                    }
                });
            });
            document.querySelectorAll('.unban-user').forEach(btn => {
                btn.addEventListener('click', async () => {
                    await updateDoc(doc(db, "users", btn.dataset.id), { isBanned: false });
                    loadUsers();
                    loadStats();
                });
            });
        }

        document.getElementById('closeStealthModal').addEventListener('click', () => {
            document.getElementById('stealthModal').style.display = 'none';
        });
        window.onclick = (e) => {
            if (e.target === document.getElementById('stealthModal')) {
                document.getElementById('stealthModal').style.display = 'none';
            }
        };
    </script>
</body>
</html>

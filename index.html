<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الثانوية الرسمية بلس | قريباً</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
        
        /* أنيميشن الخلفية */
        .bg-animation {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }
        
        .bg-animation span {
            position: absolute;
            display: block;
            width: 20px;
            height: 20px;
            background: rgba(245, 176, 65, 0.1);
            border-radius: 50%;
            animation: float 15s infinite linear;
        }
        
        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            100% { transform: translateY(-100vh) scale(1); opacity: 0.5; }
        }
        
        /* الكارد الرئيسي */
        .card {
            position: relative;
            z-index: 10;
            background: rgba(30, 30, 46, 0.95);
            backdrop-filter: blur(15px);
            border-radius: 64px;
            padding: 60px 50px;
            text-align: center;
            max-width: 600px;
            width: 90%;
            border: 1px solid rgba(245, 176, 65, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            animation: fadeInUp 0.8s ease-out;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .logo {
            width: 100px;
            height: 100px;
            border-radius: 30px;
            object-fit: cover;
            margin-bottom: 25px;
            border: 2px solid #f5b041;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
        }
        
        h1 {
            font-size: 32px;
            font-weight: 900;
            color: #f5b041;
            margin-bottom: 15px;
            letter-spacing: -0.5px;
        }
        
        .subtitle {
            color: #94a3b8;
            font-size: 16px;
            margin-bottom: 40px;
        }
        
        /* أنيميشن الكتابة */
        .status-box {
            background: rgba(245, 176, 65, 0.1);
            border-radius: 60px;
            padding: 20px 30px;
            margin: 30px 0;
            border: 1px solid rgba(245, 176, 65, 0.3);
        }
        
        .status-text {
            font-size: 28px;
            font-weight: 800;
            color: #f5b041;
            display: inline-block;
            overflow: hidden;
            white-space: nowrap;
            border-left: 3px solid #f5b041;
            animation: typing 2s steps(20, end), blink 0.6s step-end infinite;
        }
        
        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }
        
        @keyframes blink {
            0%, 100% { border-color: transparent; }
            50% { border-color: #f5b041; }
        }
        
        .features {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
            margin: 35px 0;
        }
        
        .feature {
            background: rgba(255,255,255,0.05);
            padding: 12px 20px;
            border-radius: 40px;
            font-size: 14px;
            color: #cbd5e1;
        }
        
        .feature i {
            color: #f5b041;
            margin-left: 8px;
        }
        
        .btn {
            background: #f5b041;
            color: #0a0a0a;
            border: none;
            padding: 14px 35px;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }
        
        .btn:hover {
            transform: scale(1.03);
            box-shadow: 0 10px 25px -5px rgba(245,176,65,0.4);
            background: #e2a02a;
        }
        
        .date {
            margin-top: 30px;
            color: #64748b;
            font-size: 13px;
        }
        
        /* شريط تقدم متحرك */
        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            margin-top: 25px;
            overflow: hidden;
        }
        
        .progress-fill {
            width: 65%;
            height: 100%;
            background: linear-gradient(90deg, #f5b041, #e2a02a);
            border-radius: 4px;
            animation: progress 2s ease-in-out infinite alternate;
        }
        
        @keyframes progress {
            from { width: 60%; }
            to { width: 75%; }
        }
        
        @media (max-width: 550px) {
            .card { padding: 40px 25px; }
            h1 { font-size: 26px; }
            .status-text { font-size: 22px; white-space: normal; animation: none; border-left: none; }
            .features { gap: 12px; }
        }
    </style>
</head>
<body>

<div class="bg-animation" id="bgAnimation"></div>

<div class="card">
    <img class="logo" src="https://i.ibb.co/v6TBWQF7/1779439519874-5afe5a49-b538-4888-abbc-b0142eeca273.png" alt="شعار المنصة">
    
    <h1>منصة الثانوية الرسمية بلس</h1>
    <div class="subtitle">نحن نبني أقوى منصة تعليمية في مصر</div>
    
    <div class="status-box">
        <div class="status-text">⚙️ تحت التطوير ⚙️</div>
    </div>
    
    <div class="features">
        <div class="feature"><i class="fas fa-star"></i> انتظروا العظمة</div>
        <div class="feature"><i class="fas fa-rocket"></i> قريباً جداً</div>
        <div class="feature"><i class="fas fa-gem"></i> تجربة فريدة</div>
    </div>
    
    <div class="progress-bar">
        <div class="progress-fill"></div>
    </div>
    
    <button class="btn" onclick="notifyMe()">🔔 أبلغني عند الافتتاح</button>
    
    <div class="date">
        <i class="fas fa-calendar-alt"></i> الإطلاق المنتظر: قريباً 2026
    </div>
</div>

<script>
    // إنشاء الخلفية المتحركة
    function createBubbles() {
        const container = document.getElementById('bgAnimation');
        for(let i = 0; i < 60; i++) {
            let bubble = document.createElement('span');
            let size = Math.random() * 80 + 10;
            bubble.style.width = size + 'px';
            bubble.style.height = size + 'px';
            bubble.style.left = Math.random() * 100 + '%';
            bubble.style.animationDuration = Math.random() * 15 + 10 + 's';
            bubble.style.animationDelay = Math.random() * 10 + 's';
            bubble.style.background = `rgba(245, 176, 65, ${Math.random() * 0.08})`;
            container.appendChild(bubble);
        }
    }
    createBubbles();
    
    function notifyMe() {
        alert('✅ تم تسجيل اهتمامك! سنخبرك فور افتتاح المنصة.');
    }
    
    // إضافة أيقونات FontAwesome
    let link = document.createElement('link');
    link.rel = 'stylesheet';
    link.href = 'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css';
    document.head.appendChild(link);
</script>

</body>
</html>

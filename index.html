<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>منصة الثانوية الرسمية بلس</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lalezar&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Lalezar', cursive; background: #0f172a; min-height: 100vh; color: #fff; }
    .container { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
    
    /* بطاقة التسجيل */
    .register-card {
      background: #1e293b;
      border-radius: 40px;
      padding: 45px 40px;
      max-width: 550px;
      width: 100%;
      box-shadow: 0 25px 50px rgba(0,0,0,0.3);
      border: 1px solid #334155;
    }
    
    .logo-area { text-align: center; margin-bottom: 25px; }
    .logo-img { width: 90px; height: 90px; border-radius: 25px; object-fit: cover; }
    h1 { text-align: center; color: #ffd700; font-size: 28px; margin-top: 15px; }
    .subtitle { text-align: center; color: #94a3b8; margin-bottom: 30px; font-size: 14px; }
    
    .input-group { margin-bottom: 18px; }
    .input-group label { display: block; margin-bottom: 8px; color: #ffd700; font-weight: 500; }
    .input-group input, .input-group select {
      width: 100%;
      padding: 14px 16px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 20px;
      font-size: 16px;
      font-family: 'Lalezar', cursive;
      color: #fff;
    }
    .input-group input:focus, .input-group select:focus {
      outline: none;
      border-color: #ffd700;
    }
    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    
    .btn-submit {
      width: 100%;
      padding: 15px;
      background: #ffd700;
      color: #0f172a;
      border: none;
      border-radius: 30px;
      font-size: 20px;
      font-weight: bold;
      font-family: 'Lalezar', cursive;
      cursor: pointer;
      margin-top: 15px;
      transition: 0.3s;
    }
    .btn-submit:hover { background: #ffaa00; transform: scale(1.02); }
    
    .error {
      background: #450a0a;
      border: 1px solid #ef4444;
      color: #fca5a5;
      padding: 12px;
      border-radius: 20px;
      margin-bottom: 20px;
      display: none;
      text-align: center;
    }
    
    @media (max-width: 600px) {
      .register-card { padding: 30px 25px; }
      .row-2 { grid-template-columns: 1fr; gap: 0; }
      h1 { font-size: 24px; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="register-card" id="loginCard">
    <div class="logo-area">
      <img class="logo-img" id="logoImg" src="https://i.ibb.co/v6TBWQF7/1779439519874-5afe5a49-b538-4888-abbc-b0142eeca273.png" alt="شعار المنصة">
    </div>
    <h1>منصة الثانوية الرسمية بلس</h1>
    <div class="subtitle">تسجيل دخول الطلاب</div>
    <div id="errorMsg" class="error"></div>
    
    <form id="loginForm">
      <div class="input-group">
        <label><i class="fas fa-user"></i> الاسم كاملاً</label>
        <input type="text" id="studentName" required placeholder="مثال: أحمد محمد علي">
      </div>
      <div class="row-2">
        <div class="input-group">
          <label><i class="fas fa-graduation-cap"></i> الصف</label>
          <select id="studentGrade">
            <option value="اولى ثانوي">أولى ثانوي</option>
            <option value="تانية ثانوي" selected>تانية ثانوي</option>
            <option value="تالتة ثانوي">تالتة ثانوي</option>
          </select>
        </div>
        <div class="input-group">
          <label><i class="fas fa-chart-line"></i> الشعبة</label>
          <select id="studentSection">
            <option value="علمي">علمي</option>
            <option value="ادبي">أدبي</option>
          </select>
        </div>
      </div>
      <div class="row-2">
        <div class="input-group">
          <label><i class="fas fa-venus-mars"></i> الجنس</label>
          <select id="studentGender">
            <option value="ذكر">ذكر</option>
            <option value="انثى">أنثى</option>
          </select>
        </div>
        <div class="input-group">
          <label><i class="fas fa-mosque"></i> النوع</label>
          <select id="studentType">
            <option value="عام">عام</option>
            <option value="ازهري">أزهري</option>
          </select>
        </div>
      </div>
      <button type="submit" class="btn-submit"><i class="fas fa-sign-in-alt"></i> دخول</button>
    </form>
  </div>

  <div id="mainPlatform" style="display:none; width:100%;"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, doc, setDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
  
  const firebaseConfig = {
    apiKey: "AIzaSyB3Z8iHqNNfWEWrwIfP15x3hlh65GEZ0mQ",
    authDomain: "sanaayee.firebaseapp.com",
    databaseURL: "https://sanaayee-default-rtdb.firebaseio.com",
    projectId: "sanaayee",
    storageBucket: "sanaayee.firebasestorage.app",
    messagingSenderId: "1048456368002",
    appId: "1:1048456368002:web:e37c8e2b7ebba18ef2499b",
    measurementId: "G-XCYY1H22CQ"
  };
  
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  
  let currentStudent = localStorage.getItem('currentStudent');
  if(currentStudent) {
    showPlatform(JSON.parse(currentStudent));
  }
  
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    console.log("تم الضغط على دخول");
    
    const studentData = {
      name: document.getElementById('studentName').value,
      grade: document.getElementById('studentGrade').value,
      section: document.getElementById('studentSection').value,
      gender: document.getElementById('studentGender').value,
      type: document.getElementById('studentType').value,
      loginTime: new Date().toISOString()
    };
    
    if(!studentData.name || studentData.name.trim() === '') {
      showError('من فضلك أدخل اسمك');
      return;
    }
    
    const studentId = studentData.name + '_' + Date.now();
    await setDoc(doc(db, "students", studentId), studentData);
    localStorage.setItem('currentStudent', JSON.stringify(studentData));
    localStorage.setItem('studentId', studentId);
    showPlatform(studentData);
  });
  
  function showError(msg) {
    const errorDiv = document.getElementById('errorMsg');
    errorDiv.textContent = msg;
    errorDiv.style.display = 'block';
    setTimeout(() => errorDiv.style.display = 'none', 3000);
  }
  
  async function showPlatform(student) {
    document.getElementById('loginCard').style.display = 'none';
    const platformDiv = document.getElementById('mainPlatform');
    
    const booksSnapshot = await getDocs(collection(db, "books"));
    let books = [];
    booksSnapshot.forEach(doc => books.push({ id: doc.id, ...doc.data() }));
    
    platformDiv.innerHTML = `
      <div style="max-width: 1200px; margin: auto; padding: 20px;">
        <!-- الهيدر -->
        <div style="background: #1e293b; border-radius: 30px; padding: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
          <div style="display: flex; align-items: center; gap: 15px;">
            <img src="https://i.ibb.co/v6TBWQF7/1779439519874-5afe5a49-b538-4888-abbc-b0142eeca273.png" style="height: 50px; border-radius: 15px;">
            <h2 style="color:#ffd700; font-size:20px;">منصة الثانوية الرسمية بلس</h2>
          </div>
          <div>
            <p style="color:#fff;">مرحباً <strong style="color:#ffd700;">${student.name}</strong></p>
            <p style="color:#94a3b8; font-size:12px;">${student.grade} - ${student.section} - ${student.type}</p>
          </div>
          <button onclick="logout()" style="background:#ef4444; color:#fff; border:none; padding:10px 20px; border-radius:25px; cursor:pointer;"><i class="fas fa-sign-out-alt"></i> خروج</button>
        </div>
        
        <!-- البحث -->
        <div style="margin-bottom: 30px;">
          <input type="text" id="searchInput" placeholder="🔍 ابحث عن كتاب..." style="width:100%; padding:15px; border-radius:30px; border:none; background:#1e293b; color:#fff; font-family:'Lalezar';">
        </div>
        
        <!-- مميزات المنصة -->
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap: 15px; margin-bottom: 40px;">
          <div style="background:#1e293b; padding:15px; border-radius:20px; text-align:center;"><i class="fas fa-book" style="color:#ffd700; font-size:24px;"></i><p style="margin-top:8px;">كتب وملخصات</p></div>
          <div style="background:#1e293b; padding:15px; border-radius:20px; text-align:center;"><i class="fas fa-chart-line" style="color:#ffd700; font-size:24px;"></i><p style="margin-top:8px;">تقييمات أسبوعية</p></div>
          <div style="background:#1e293b; padding:15px; border-radius:20px; text-align:center;"><i class="fas fa-users" style="color:#ffd700; font-size:24px;"></i><p style="margin-top:8px;">متابعة ولي الأمر</p></div>
          <div style="background:#1e293b; padding:15px; border-radius:20px; text-align:center;"><i class="fas fa-download" style="color:#ffd700; font-size:24px;"></i><p style="margin-top:8px;">تحميل مباشر</p></div>
        </div>
        
        <!-- المكتبة -->
        <h2 style="color:#ffd700; margin-bottom: 25px;">📚 المكتبة الرقمية</h2>
        ${['اولى ثانوي', 'تانية ثانوي', 'تالتة ثانوي'].map(grade => `
          <div style="margin-bottom: 40px;">
            <h3 style="background:#334155; display:inline-block; padding:5px 20px; border-radius:20px; margin-bottom: 20px;">📖 ${grade}</h3>
            <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(260px,1fr)); gap: 20px;">
              ${books.filter(b => b.grade === grade).map(book => `
                <div class="book-card" data-book="${book.title.toLowerCase()}" style="background:#1e293b; border-radius:20px; overflow:hidden;">
                  <img src="${book.cover || 'https://placehold.co/400x180/334155/ffd700?text=' + encodeURIComponent(book.title)}" style="width:100%; height:140px; object-fit:cover;">
                  <div style="padding:15px;">
                    <h4 style="color:#ffd700;">${book.title}</h4>
                    <p style="color:#94a3b8; font-size:12px;">${book.author || 'منصة الثانوية الرسمية بلس'}</p>
                    <span style="background:#334155; color:#ffd700; padding:3px 12px; border-radius:15px; font-size:12px;">${book.type || 'كتاب'}</span>
                    <a href="${book.link}" target="_blank" style="display:block; margin-top:12px; background:#ffd700; color:#0f172a; text-align:center; padding:8px; border-radius:25px; text-decoration:none; font-weight:bold;"><i class="fas fa-download"></i> تحميل</a>
                  </div>
                </div>
              `).join('')}
              ${books.filter(b => b.grade === grade).length === 0 ? '<p style="color:#94a3b8;">لا توجد كتب مضافة</p>' : ''}
            </div>
          </div>
        `).join('')}
        
        <!-- التقييمات -->
        <h2 style="color:#ffd700; margin: 40px 0 20px;">📝 التقييمات الأسبوعية</h2>
        <div style="background:#1e293b; border-radius:25px; padding:25px;">
          <div id="weeklyQuiz"></div>
        </div>
      </div>
    `;
    
    // البحث
    const searchInput = document.getElementById('searchInput');
    searchInput.addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase();
      document.querySelectorAll('.book-card').forEach(card => {
        const title = card.getAttribute('data-book') || '';
        card.style.display = title.includes(term) ? 'block' : 'none';
      });
    });
    
    loadWeeklyQuiz(student);
  }
  
  async function loadWeeklyQuiz(student) {
    const quizDiv = document.getElementById('weeklyQuiz');
    quizDiv.innerHTML = `
      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 15px;">
        <div><label style="color:#ffd700;">مستوى الاستفادة</label><select id="quiz1" style="width:100%; padding:10px; border-radius:20px; background:#0f172a; color:#fff; border:1px solid #334155;"><option>ممتاز</option><option>جيد</option><option>متوسط</option><option>ضعيف</option></select></div>
        <div><label style="color:#ffd700;">هل توصي المنصة لزملائك؟</label><select id="quiz2" style="width:100%; padding:10px; border-radius:20px; background:#0f172a; color:#fff; border:1px solid #334155;"><option>نعم</option><option>ربما</option><option>لا</option></select></div>
      </div>
      <button onclick="submitQuiz()" style="margin-top:20px; background:#ffd700; color:#0f172a; border:none; padding:12px 25px; border-radius:30px; cursor:pointer; font-weight:bold;">إرسال التقييم</button>
    `;
  }
  
  window.submitQuiz = async function() {
    const quiz1 = document.getElementById('quiz1')?.value;
    const quiz2 = document.getElementById('quiz2')?.value;
    const student = JSON.parse(localStorage.getItem('currentStudent'));
    if(student && quiz1 && quiz2) {
      await setDoc(doc(db, "quizzes", Date.now().toString()), { student: student.name, grade: student.grade, quiz1, quiz2, date: new Date().toISOString() });
      alert('شكراً لتقييمك');
    } else {
      alert('حدث خطأ');
    }
  };
  
  window.logout = function() {
    localStorage.removeItem('currentStudent');
    localStorage.removeItem('studentId');
    location.reload();
  };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>منصة الثانوية الرسمية بلس | الإمبراطورية التعليمية</title>
  
  <!-- SEO خارق -->
  <meta name="description" content="منصة الثانوية الرسمية بلس: أكبر مكتبة رقمية لطلاب أولى وتانية وتالتة ثانوي. كتب، ملخصات، تقييمات أسبوعية، ومتابعة مع ولي الأمر.">
  <meta name="keywords" content="منصة الثانوية الرسمية بلس, تانية ثانوي, أولى ثانوي, تالته ثانوي, كتب خارجية, ملخصات, محمد صلاح عربي, محمد عبد المعبود فيزياء, أحمد عادل تاريخ">
  <meta name="author" content="الثانوية الرسمية بلس">
  <meta name="robots" content="index, follow">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- الخط Lalezar -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lalezar&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Lalezar', cursive;
      background: linear-gradient(135deg, #0a0f2e 0%, #050a18 100%);
      min-height: 100vh;
      color: #ffffff;
    }
    
    /* أنيميشن الخلفية */
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-20px); }
      100% { transform: translateY(0px); }
    }
    
    @keyframes glowPulse {
      0% { box-shadow: 0 0 20px rgba(255,215,0,0.3); border-color: #ffd700; }
      100% { box-shadow: 0 0 60px rgba(255,215,0,0.6); border-color: #ffaa00; }
    }
    
    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    
    /* بطاقة تسجيل الدخول الفخمة */
    .glass-card {
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(15px);
      border-radius: 60px;
      padding: 50px 40px;
      max-width: 550px;
      width: 100%;
      border: 2px solid rgba(255,215,0,0.3);
      animation: glowPulse 3s infinite alternate;
      transition: 0.3s;
    }
    
    .logo-area {
      text-align: center;
      margin-bottom: 30px;
    }
    
    .logo-img {
      width: 110px;
      height: 110px;
      border-radius: 35px;
      object-fit: cover;
      box-shadow: 0 15px 35px rgba(0,0,0,0.3);
      border: 3px solid #ffd700;
    }
    
    h1 {
      text-align: center;
      color: #ffd700;
      font-size: 32px;
      margin-top: 20px;
      letter-spacing: 1px;
    }
    
    .subtitle {
      text-align: center;
      color: #94a3b8;
      margin-bottom: 35px;
      font-size: 14px;
    }
    
    .input-group {
      margin-bottom: 20px;
    }
    
    .input-group label {
      display: block;
      margin-bottom: 8px;
      color: #ffd700;
      font-weight: 500;
      font-size: 16px;
    }
    
    .input-group input,
    .input-group select {
      width: 100%;
      padding: 15px 18px;
      background: #1e293b;
      border: 2px solid #334155;
      border-radius: 50px;
      font-size: 16px;
      font-family: 'Lalezar', cursive;
      color: #ffffff;
      transition: 0.3s;
    }
    
    .input-group input:focus,
    .input-group select:focus {
      outline: none;
      border-color: #ffd700;
      box-shadow: 0 0 15px rgba(255,215,0,0.3);
    }
    
    .input-group input::placeholder {
      color: #64748b;
    }
    
    .row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }
    
    .btn-gold {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #ffd700, #ffaa00);
      color: #0a0f2e;
      border: none;
      border-radius: 50px;
      font-size: 20px;
      font-weight: bold;
      font-family: 'Lalezar', cursive;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 15px;
    }
    
    .btn-gold:hover {
      transform: scale(1.02);
      box-shadow: 0 10px 30px rgba(255,215,0,0.4);
    }
    
    .error {
      background: rgba(220,38,38,0.2);
      border: 1px solid #ef4444;
      color: #fca5a5;
      padding: 12px;
      border-radius: 40px;
      margin-bottom: 20px;
      display: none;
      text-align: center;
    }
    
    @media (max-width: 600px) {
      .glass-card { padding: 30px 25px; }
      .row-2 { grid-template-columns: 1fr; gap: 0; }
      h1 { font-size: 26px; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="glass-card" id="loginCard">
    <div class="logo-area">
      <img class="logo-img" id="logoImg" src="https://i.ibb.co/v6TBWQF7/1779439519874-5afe5a49-b538-4888-abbc-b0142eeca273.png" alt="شعار المنصة">
    </div>
    <h1>منصة الثانوية الرسمية بلس</h1>
    <div class="subtitle">وجهتك الاولي للتعلم</div>
    <div id="errorMsg" class="error"></div>
    <form id="loginForm">
      <div class="input-group">
        <label><i class="fas fa-user-graduate"></i> الاسم الكامل</label>
        <input type="text" id="studentName" required placeholder="مثال: أحمد محمد">
      </div>
      <div class="row-2">
        <div class="input-group">
          <label><i class="fas fa-graduation-cap"></i> الصف</label>
          <select id="studentGrade">
            <option value="اولى ثانوي">📘 اولى ثانوي</option>
            <option value="تانية ثانوي" selected>📙 تانية ثانوي</option>
            <option value="تالتة ثانوي">📕 تالتة ثانوي</option>
          </select>
        </div>
        <div class="input-group">
          <label><i class="fas fa-chart-line"></i> الشعبة</label>
          <select id="studentSection">
            <option value="علمي">🔬 علمي</option>
            <option value="ادبي">📖 ادبي</option>
          </select>
        </div>
      </div>
      <div class="row-2">
        <div class="input-group">
          <label><i class="fas fa-venus-mars"></i> الجنس</label>
          <select id="studentGender">
            <option value="ذكر">👨 ذكر</option>
            <option value="انثى">👩 انثى</option>
          </select>
        </div>
        <div class="input-group">
          <label><i class="fas fa-mosque"></i> النوع</label>
          <select id="studentType">
            <option value="عام">📚 عام</option>
            <option value="ازهري">🕌 ازهري</option>
          </select>
        </div>
      </div>
      <button type="submit" class="btn-gold"><i class="fas fa-crown"></i> دخول الإمبراطورية</button>
    </form>
  </div>

  <div id="mainPlatform" style="display:none; width:100%;"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
  
  const firebaseConfig = {
    apiKey: "AIzaSyB3Z8iHqNNfWEWrwIfP15x3hlh65GEZ0mQ",
    authDomain: "sanaayee.firebaseapp.com",
    databaseURL: "https://sanaayee-default-rtdb.firebaseio.com",
    projectId: "sanaayee",
    storageBucket: "sanaayee.firebasestorage.app",
    messagingSenderId: "1048456368002",
    appId: "1:1048456368002:web:e37c8e2b7ebba18ef2499b",
    measurementId: "G-XCYY1H22CQ"
  };
  
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  
  let currentStudent = localStorage.getItem('currentStudent');
  if(currentStudent) {
    showPlatform(JSON.parse(currentStudent));
  }
  
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const studentData = {
      name: document.getElementById('studentName').value,
      grade: document.getElementById('studentGrade').value,
      section: document.getElementById('studentSection').value,
      gender: document.getElementById('studentGender').value,
      type: document.getElementById('studentType').value,
      loginTime: new Date().toISOString()
    };
    
    if(!studentData.name) {
      showError('من فضلك أدخل اسمك الكريم');
      return;
    }
    
    const studentId = studentData.name + '_' + Date.now();
    await setDoc(doc(db, "students", studentId), studentData);
    localStorage.setItem('currentStudent', JSON.stringify(studentData));
    localStorage.setItem('studentId', studentId);
    showPlatform(studentData);
  });
  
  function showError(msg) {
    const errorDiv = document.getElementById('errorMsg');
    errorDiv.textContent = msg;
    errorDiv.style.display = 'block';
    setTimeout(() => errorDiv.style.display = 'none', 3000);
  }
  
  async function showPlatform(student) {
    document.getElementById('loginCard').style.display = 'none';
    const platformDiv = document.getElementById('mainPlatform');
    
    const booksSnapshot = await getDocs(collection(db, "books"));
    let books = [];
    booksSnapshot.forEach(doc => books.push({ id: doc.id, ...doc.data() }));
    
    platformDiv.innerHTML = `
      <div style="max-width: 1400px; margin: auto; padding: 20px;">
        <!-- الهيدر الفخم -->
        <div style="background: rgba(15,23,42,0.9); backdrop-filter: blur(10px); border-radius: 40px; padding: 20px 30px; margin-bottom: 40px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; border: 1px solid rgba(255,215,0,0.3);">
          <div style="display: flex; align-items: center; gap: 15px;">
            <img src="https://i.ibb.co/v6TBWQF7/1779439519874-5afe5a49-b538-4888-abbc-b0142eeca273.png" style="height: 55px; border-radius: 20px;">
            <div>
              <h1 style="color:#ffd700; font-size:24px; margin:0;">منصة الثانوية الرسمية بلس</h1>
              <p style="color:#94a3b8; font-size:12px;">الإمبراطورية التعليمية</p>
            </div>
          </div>
          <div style="text-align: center;">
            <p style="color:#ffd700; font-size:20px;">مرحباً ${student.name}</p>
            <p style="color:#94a3b8;">${student.grade} - ${student.section} - ${student.type}</p>
          </div>
          <button onclick="logout()" style="background: linear-gradient(135deg,#ef4444,#dc2626); color:white; border:none; padding:12px 25px; border-radius:40px; cursor:pointer; font-family:'Lalezar';"><i class="fas fa-sign-out-alt"></i> خروج</button>
        </div>
        
        <!-- شريط البحث -->
        <div style="margin-bottom: 40px;">
          <div style="background:#1e293b; border-radius: 60px; padding: 5px 20px; display: flex; align-items: center; border: 1px solid #ffd70030;">
            <i class="fas fa-search" style="color:#ffd700; font-size:20px;"></i>
            <input type="text" id="searchInput" placeholder="ابحث عن كتاب أو ملخص..." style="background:transparent; border:none; padding:18px; width:100%; color:white; font-family:'Lalezar'; font-size:16px;">
          </div>
        </div>
        
        <!-- مميزات المنصة -->
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap: 20px; margin-bottom: 50px;">
          <div style="background: linear-gradient(135deg,#1e293b,#0f172a); border-radius: 30px; padding: 20px; text-align: center; border-bottom: 3px solid #ffd700;"><i class="fas fa-book" style="color:#ffd700; font-size:35px;"></i><h3 style="margin-top:10px;">كتب وملخصات</h3></div>
          <div style="background: linear-gradient(135deg,#1e293b,#0f172a); border-radius: 30px; padding: 20px; text-align: center; border-bottom: 3px solid #ffd700;"><i class="fas fa-chart-line" style="color:#ffd700; font-size:35px;"></i><h3 style="margin-top:10px;">تقييمات أسبوعية</h3></div>
          <div style="background: linear-gradient(135deg,#1e293b,#0f172a); border-radius: 30px; padding: 20px; text-align: center; border-bottom: 3px solid #ffd700;"><i class="fas fa-users" style="color:#ffd700; font-size:35px;"></i><h3 style="margin-top:10px;">متابعة ولي الأمر</h3></div>
          <div style="background: linear-gradient(135deg,#1e293b,#0f172a); border-radius: 30px; padding: 20px; text-align: center; border-bottom: 3px solid #ffd700;"><i class="fas fa-download" style="color:#ffd700; font-size:35px;"></i><h3 style="margin-top:10px;">تحميل مباشر</h3></div>
        </div>
        
        <!-- المكتبة -->
        <h2 style="color:#ffd700; font-size:32px; margin: 40px 0 30px;"><i class="fas fa-book-open"></i> المكتبة الرقمية</h2>
        ${['اولى ثانوي', 'تانية ثانوي', 'تالتة ثانوي'].map(grade => `
          <div style="margin-bottom: 50px;">
            <div style="background:#ffd70020; display:inline-block; padding:8px 30px; border-radius: 40px; margin-bottom: 25px;">
              <h3 style="color:#ffd700; font-size:24px;">📖 ${grade}</h3>
            </div>
            <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap: 25px;">
              ${books.filter(b => b.grade === grade).map(book => `
                <div class="book-card" data-book="${book.title.toLowerCase()}" style="background: linear-gradient(135deg,#1e293b,#0f172a); border-radius: 30px; overflow: hidden; transition: 0.3s; border: 1px solid #ffd70030;">
                  <img src="${book.cover || 'https://placehold.co/400x200/1e293b/ffd700?text=' + encodeURIComponent(book.title)}" style="width:100%; height:180px; object-fit:cover;">
                  <div style="padding: 20px;">
                    <h3 style="color:#ffd700; font-size:20px;">${book.title}</h3>
                    <p style="color:#94a3b8; margin: 10px 0;">${book.author || 'منصة الثانوية الرسمية بلس'}</p>
                    <span style="background:#ffd70020; color:#ffd700; padding:5px 15px; border-radius:20px; font-size:12px;">${book.type || 'كتاب'}</span>
                    <a href="${book.link}" target="_blank" style="display:inline-block; margin-top:15px; background: linear-gradient(135deg,#ffd700,#ffaa00); color:#0a0f2e; padding:10px 25px; border-radius:40px; text-decoration:none; font-weight:bold;"><i class="fas fa-download"></i> تحميل الآن</a>
                  </div>
                </div>
              `).join('')}
              ${books.filter(b => b.grade === grade).length === 0 ? '<p style="color:#94a3b8; text-align:center; padding:40px;">📭 لا توجد كتب مضافة لهذا الصف حتى الآن</p>' : ''}
            </div>
          </div>
        `).join('')}
        
        <!-- التقييمات الأسبوعية -->
        <h2 style="color:#ffd700; font-size:32px; margin: 50px 0 30px;"><i class="fas fa-star"></i> التقييمات الأسبوعية</h2>
        <div style="background: linear-gradient(135deg,#1e293b,#0f172a); border-radius: 40px; padding: 35px; margin-bottom: 50px; border: 1px solid #ffd70030;">
          <h3 style="color:#ffd700; font-size:24px;">تقييم الأسبوع</h3>
          <p style="color:#94a3b8; margin-bottom: 20px;">شاركنا رأيك ليساعدنا على التطوير</p>
          <div id="weeklyQuiz"></div>
        </div>
      </div>
    `;
    
    // تفعيل البحث
    const searchInput = document.getElementById('searchInput');
    searchInput.addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase();
      document.querySelectorAll('.book-card').forEach(card => {
        const title = card.getAttribute('data-book') || '';
        card.style.display = title.includes(term) ? 'block' : 'none';
      });
    });
    
    loadWeeklyQuiz(student);
  }
  
  async function loadWeeklyQuiz(student) {
    const quizDiv = document.getElementById('weeklyQuiz');
    quizDiv.innerHTML = `
      <div class="row-2" style="gap:20px;">
        <div class="input-group"><label style="color:#ffd700;"><i class="fas fa-smile"></i> مستوى الاستفادة</label><select id="quiz1" style="background:#0f172a; color:white; padding:12px; border-radius:30px;"><option>ممتاز</option><option>جيد جداً</option><option>جيد</option><option>متوسط</option><option>ضعيف</option></select></div>
        <div class="input-group"><label style="color:#ffd700;"><i class="fas fa-share-alt"></i> هل توصي المنصة لزملائك؟</label><select id="quiz2" style="background:#0f172a; color:white; padding:12px; border-radius:30px;"><option>نعم بالتأكيد</option><option>ربما</option><option>لا</option></select></div>
      </div>
      <button onclick="submitQuiz()" class="btn-gold" style="margin-top:25px;"><i class="fas fa-paper-plane"></i> إرسال التقييم</button>
    `;
  }
  
  window.submitQuiz = async function() {
    const quiz1 = document.getElementById('quiz1')?.value;
    const quiz2 = document.getElementById('quiz2')?.value;
    const student = JSON.parse(localStorage.getItem('currentStudent'));
    if(student && quiz1 && quiz2) {
      const quizData = { student: student.name, grade: student.grade, quiz1, quiz2, date: new Date().toISOString() };
      await setDoc(doc(db, "quizzes", Date.now().toString()), quizData);
      alert('🎉 شكراً لتقييمك! رأيك يهمنا جداً');
    } else {
      alert('حدث خطأ، حاول مرة أخرى');
    }
  };
  
  window.logout = function() {
    localStorage.removeItem('currentStudent');
    localStorage.removeItem('studentId');
    location.reload();
  };
</script>
</body>
</html>

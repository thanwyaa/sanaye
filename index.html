<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة ثانية ثانوي الرسمية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #0f172a; --secondary: #3b82f6; --accent: #fbbf24; --bg: #f8fafc; --text: #1e293b; --card: #ffffff; }
        body.theme-red-black { --primary: #000; --secondary: #e11d48; --bg: #000; --text: #fff; --card: #111; }
        body.theme-purple { --primary: #2e1065; --secondary: #a855f7; --bg: #0f0720; --text: #f5f3ff; --card: #1e1b4b; }
        body.theme-gold { --primary: #451a03; --secondary: #d97706; --accent: #facc15; }
        body.dark-mode { --bg: #0f172a; --text: #f1f5f9; --card: #1e293b; }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; transition: 0.3s; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

        .lantern { position: fixed; top: 0; font-size: 40px; z-index: 2000; display: none; animation: swing 3s infinite ease-in-out; transform-origin: top; }
        @keyframes swing { 0%, 100% { transform: rotate(-10deg); } 50% { transform: rotate(10deg); } }

        .alert-strip { background: var(--primary); color: #fff; padding: 12px 0; border-bottom: 3px solid var(--accent); overflow: hidden; }
        .marquee { display: flex; white-space: nowrap; animation: scroll 20s linear infinite; font-weight: 900; }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .pulse-btn { display: inline-block; padding: 4px 12px; color: #fff; font-weight: bold; animation: pulse-anim 1.5s infinite; margin-left: 10px; font-size: 0.9rem; vertical-align: middle; }
        @keyframes pulse-anim { 0%, 100% { transform: scale(0.9); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } }
        .shape-star { clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); padding: 15px !important; }

        header { background: var(--card); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000; }
        #site-logo { width: 45px; height: 45px; border-radius: 8px; object-fit: cover; }

        .main-container { padding: 30px 5%; max-width: 1200px; margin: 0 auto; }
        .grid-layout { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }

        .folder-btn { background: var(--card); border-radius: 20px; padding: 40px; text-align: center; cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .folder-btn i { font-size: 3.5rem; color: var(--secondary); margin-bottom: 15px; display: block; }

        .admin-modal { display: none; position: fixed; inset: 0; background: #f1f5f9; z-index: 9999; padding: 20px; overflow-y: auto; color: #1e293b; }
        .admin-card { background: #fff; border-radius: 15px; padding: 20px; margin-bottom: 20px; border: 1px solid #cbd5e1; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ccc; font-weight: bold; }
        .btn-admin { background: #10b981; color: #fff; border: none; padding: 15px; border-radius: 10px; width: 100%; cursor: pointer; font-weight: 900; margin-top: 5px; }

        footer { background: var(--primary); color: #fff; padding: 40px 5%; text-align: center; margin-top: 50px; border-top: 4px solid var(--accent); }
    </style>
</head>
<body class="default">

    <div class="lantern" id="L1" style="right: 20px;">🏮</div>
    <div class="lantern" id="L2" style="left: 20px;">🏮</div>

    <div class="alert-strip"><div class="marquee"><span id="pulse-area"></span><span id="alert-text">..</span></div></div>

    <header>
        <div style="display:flex; align-items:center; gap:10px;">
            <img id="site-logo" src="">
            <h2 id="site-name-display" style="font-weight:900; color:var(--secondary)"></h2>
        </div>
        <button onclick="toggleDayNight()" style="background:none; border:none; font-size:1.5rem; cursor:pointer;">🌓</button>
    </header>

    <div class="main-container">
        <div id="home-screen" class="grid-layout"></div>
        <div id="content-screen" style="display:none;">
            <button onclick="showHome()" style="padding:10px 20px; background:var(--secondary); color:#fff; border:none; border-radius:10px; cursor:pointer; margin-bottom:20px;">🔙 رجوع</button>
            <div id="books-grid" class="grid-layout"></div>
        </div>
    </div>

    <footer>
        <div class="social-icons" style="margin-bottom:15px;">
            <a id="admin-gate" style="color:white; font-size:2rem; cursor:pointer; margin:0 10px;"><i class="fab fa-youtube"></i></a>
            <a href="#" id="tg-link" style="color:white; font-size:2rem; margin:0 10px;"><i class="fab fa-telegram"></i></a>
            <a href="#" id="wa-link" style="color:white; font-size:2rem; margin:0 10px;"><i class="fab fa-whatsapp"></i></a>
        </div>
        <p>جميع الحقوق محفوظة لمنصة ثانية ثانوي رسمية 2026</p>
    </footer>

    <div id="admin-panel" class="admin-modal">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2>إدارة الإمبراطورية 👑</h2>
            <button onclick="closeAdmin()" style="background:red; color:white; padding:10px 20px; border-radius:10px; border:none;">إغلاق</button>
        </div>

        <div class="admin-card">
            <h3>📊 الإحصائيات: زوار الموقع (<b id="stat-v">0</b>)</h3>
            <div id="stat-books"></div>
        </div>

        <div class="admin-card">
            <h3>🔔 التحكم في زر التنبيه</h3>
            <input type="text" id="adm-p-text" placeholder="اكتب النص هنا (مثلاً: هام جداً 🔥)">
            <input type="color" id="adm-p-color">
            <select id="adm-p-shape">
                <option value="4px">مربع</option>
                <option value="50%">دائرة</option>
                <option value="star">نجمة</option>
            </select>
            <button class="btn-admin" onclick="savePulse()">تحديث زر التنبيه</button>
        </div>

        <div class="admin-card">
            <h3>📂 إدارة الأقسام (حذف/تعديل)</h3>
            <div id="tabs-manager"></div>
            <hr style="margin:15px 0">
            <input type="text" id="new-tab-name" placeholder="اسم قسم جديد">
            <button class="btn-admin" style="background:orange" onclick="addTab()">إضافة القسم</button>
        </div>

        <div class="admin-card">
            <h3>📁 إضافة كتاب/ملف جديد</h3>
            <input type="text" id="bk-title" placeholder="عنوان الكتاب">
            <input type="text" id="bk-link" placeholder="رابط التحميل">
            <input type="text" id="bk-img" placeholder="رابط الغلاف">
            <select id="bk-target"></select>
            <button class="btn-admin" onclick="addBook()">نشر الملف</button>
        </div>

        <div class="admin-card">
            <h3>🎨 مظهر المنصة</h3>
            <input type="text" id="adm-name" placeholder="اسم المنصة">
            <input type="text" id="adm-logo" placeholder="رابط اللوجو">
            <select id="adm-theme">
                <option value="default">الأزرق</option>
                <option value="theme-red-black">أحمر × أسود</option>
                <option value="theme-purple">أرجواني</option>
                <option value="theme-gold">ذهبي</option>
            </select>
            <button class="btn-admin" onclick="saveGeneral()">حفظ المظهر</button>
        </div>
    </div>

    <script>
        // الباسورد الصعب جداً
        const MASTER_KEY = "Empire_#2026_@Security_Global";

        let db = JSON.parse(localStorage.getItem('empire_final_db')) || {
            conf: { name: "منصة ثانية ثانوي", logo: "", alert: "مرحباً بكم", theme: "default", pText: "جديد 🔥", pColor: "#ff0000", pShape: "4px" },
            stats: { visitors: 0 },
            tabs: ["مذكرات", "كتب خارجية"],
            books: []
        };

        if(!sessionStorage.getItem('v')) { db.stats.visitors++; sessionStorage.setItem('v', '1'); sync(); }

        function sync() { localStorage.setItem('empire_final_db', JSON.stringify(db)); render(); }

        let taps = 0;
        document.getElementById('admin-gate').onclick = () => {
            taps++; setTimeout(() => taps = 0, 2000);
            if(taps >= 10) {
                if(prompt("كلمة السر المعقدة:") === MASTER_KEY) { 
                    document.getElementById('admin-panel').style.display = 'block'; 
                    loadAdmin(); 
                } else { alert("ممنوع الدخول!"); }
                taps = 0;
            }
        };

        function render() {
            const c = db.conf;
            document.body.className = c.theme + (localStorage.getItem('dark') === '1' ? ' dark-mode' : '');
            document.getElementById('site-name-display').innerText = c.name;
            document.getElementById('site-logo').src = c.logo;
            
            const pulse = document.getElementById('pulse-area');
            if(c.pText.trim() !== "") {
                pulse.innerHTML = `<span class="pulse-btn ${c.pShape === 'star' ? 'shape-star' : ''}" style="background:${c.pColor}; border-radius:${c.pShape === 'star' ? '0' : c.pShape}">${c.pText}</span>`;
            } else { pulse.innerHTML = ""; }

            document.getElementById('home-screen').innerHTML = db.tabs.map(t => `<div class="folder-btn" onclick="openTab('${t}')"><i class="fas fa-folder-open"></i><h2>${t}</h2></div>`).join('');
        }

        function openTab(t) {
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('content-screen').style.display = 'block';
            document.getElementById('books-grid').innerHTML = db.books.filter(b => b.tab === t).map(b => `
                <div style="background:var(--card); border-radius:15px; overflow:hidden; display:flex; height:150px; box-shadow:0 5px 10px rgba(0,0,0,0.1);">
                    <img src="${b.img}" style="width:30%; object-fit:cover;">
                    <div style="padding:15px; display:flex; flex-direction:column; justify-content:space-between; width:70%;">
                        <h3>${b.title}</h3>
                        <a href="${b.link}" onclick="track(${db.books.indexOf(b)})" target="_blank" style="background:var(--secondary); color:white; text-align:center; padding:8px; border-radius:8px; text-decoration:none;">تحميل</a>
                    </div>
                </div>
            `).join('');
        }

        function track(i) { db.books[i].clicks = (db.books[i].clicks || 0) + 1; sync(); }

        function loadAdmin() {
            document.getElementById('stat-v').innerText = db.stats.visitors;
            document.getElementById('adm-p-text').value = db.conf.pText;
            document.getElementById('adm-p-color').value = db.conf.pColor;
            document.getElementById('adm-name').value = db.conf.name;
            document.getElementById('adm-logo').value = db.conf.logo;
            document.getElementById('bk-target').innerHTML = db.tabs.map(t => `<option value="${t}">${t}</option>`).join('');
            
            // إدارة الأقسام
            document.getElementById('tabs-manager').innerHTML = db.tabs.map((t, i) => `
                <div class="item-row">
                    <input type="text" value="${t}" onchange="renameTab(${i}, this.value)" style="width:70%">
                    <button onclick="delTab(${i})" style="color:red; background:none; border:none; cursor:pointer;">❌ حذف</button>
                </div>
            `).join('');

            document.getElementById('stat-books').innerHTML = db.books.map((b, i) => `
                <div class="item-row"><span>${b.title}</span> <b>${b.clicks || 0} تحميل</b> <button onclick="delBook(${i})" style="color:red; border:none; background:none;">حذف</button></div>
            `).join('');
        }

        function savePulse() { db.conf.pText = document.getElementById('adm-p-text').value; db.conf.pColor = document.getElementById('adm-p-color').value; db.conf.pShape = document.getElementById('adm-p-shape').value; sync(); alert("تم!"); }
        function saveGeneral() { db.conf.name = document.getElementById('adm-name').value; db.conf.logo = document.getElementById('adm-logo').value; db.conf.theme = document.getElementById('adm-theme').value; sync(); alert("تم الحفظ!"); }
        function addTab() { let n = document.getElementById('new-tab-name').value; if(n){db.tabs.push(n); sync(); loadAdmin();} }
        function delTab(i) { if(confirm("حذف القسم بكل ما فيه؟")){ db.books = db.books.filter(b => b.tab !== db.tabs[i]); db.tabs.splice(i,1); sync(); loadAdmin(); } }
        function renameTab(i, newV) { db.books.forEach(b => { if(b.tab === db.tabs[i]) b.tab = newV; }); db.tabs[i] = newV; sync(); }
        function addBook() { db.books.unshift({ title: document.getElementById('bk-title').value, link: document.getElementById('bk-link').value, img: document.getElementById('bk-img').value, tab: document.getElementById('bk-target').value, clicks: 0 }); sync(); loadAdmin(); alert("تم النشر!"); }
        function delBook(i) { db.books.splice(i,1); sync(); loadAdmin(); }
        function resetStats() { db.stats.visitors = 0; db.books.forEach(b => b.clicks = 0); sync(); loadAdmin(); }
        function showHome() { document.getElementById('home-screen').style.display='grid'; document.getElementById('content-screen').style.display='none'; }
        function closeAdmin() { document.getElementById('admin-panel').style.display='none'; }
        function toggleDayNight() { localStorage.setItem('dark', localStorage.getItem('dark') === '1' ? '0' : '1'); render(); }

        render();
    </script>
</body>
</html>
public class Main {
    public static void main(String[] args){
    //start coding
    }
}

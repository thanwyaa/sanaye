<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>تسجيل الدخول | منصة الثانوية الرسمية بلس</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Tajawal', sans-serif;
      background: linear-gradient(145deg, #f0f4f8 0%, #e2e8f0 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      transition: all 0.3s ease;
    }
    body.dark {
      background: linear-gradient(145deg, #0f172a 0%, #020617 100%);
    }
    /* أنيميشن الخلفية */
    .bg-shape {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
    }
    .bg-shape span {
      position: absolute;
      display: block;
      background: rgba(245, 176, 65, 0.05);
      border-radius: 50%;
      animation: float 20s infinite linear;
    }
    @keyframes float {
      0% { transform: translateY(0) rotate(0deg); opacity: 0.3; }
      100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
    }
    .login-card {
      position: relative;
      z-index: 10;
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(2px);
      border-radius: 48px;
      padding: 52px 48px;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 35px 68px -20px rgba(0,0,0,0.25), 0 0 0 1px rgba(0,0,0,0.02);
      transition: all 0.3s ease;
      border: 1px solid rgba(245, 176, 65, 0.2);
    }
    body.dark .login-card {
      background: rgba(30, 30, 46, 0.98);
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
    }
    .logo-area {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo-img {
      width: 90px;
      height: 90px;
      border-radius: 28px;
      object-fit: cover;
      box-shadow: 0 15px 25px -10px rgba(0,0,0,0.2);
      border: 2px solid #f5b041;
    }
    h1 {
      font-size: 32px;
      font-weight: 900;
      color: #1a1a2e;
      margin-top: 16px;
      letter-spacing: -0.5px;
    }
    body.dark h1 {
      color: #f5b041;
    }
    .subtitle {
      color: #64748b;
      text-align: center;
      margin-bottom: 36px;
      font-size: 14px;
      font-weight: 500;
    }
    body.dark .subtitle {
      color: #94a3b8;
    }
    .input-group {
      margin-bottom: 22px;
    }
    .input-group label {
      display: block;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 8px;
      font-size: 14px;
    }
    body.dark .input-group label {
      color: #f5b041;
    }
    .input-group input,
    .input-group select {
      width: 100%;
      padding: 14px 18px;
      background: #f8fafc;
      border: 2px solid #e2e8f0;
      border-radius: 28px;
      font-size: 15px;
      font-family: 'Tajawal', sans-serif;
      color: #1e293b;
      transition: all 0.2s;
    }
    body.dark .input-group input,
    body.dark .input-group select {
      background: #1e1e2e;
      border-color: #334155;
      color: #f1f5f9;
    }
    .input-group input:focus,
    .input-group select:focus {
      outline: none;
      border-color: #f5b041;
      box-shadow: 0 0 0 3px rgba(245,176,65,0.15);
    }
    .row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }
    .btn-login {
      width: 100%;
      padding: 16px;
      background: #1a1a2e;
      color: white;
      border: none;
      border-radius: 40px;
      font-size: 18px;
      font-weight: 800;
      font-family: 'Tajawal', sans-serif;
      cursor: pointer;
      margin-top: 18px;
      transition: all 0.3s;
    }
    .btn-login:hover {
      background: #f5b041;
      color: #1a1a2e;
      transform: translateY(-2px);
      box-shadow: 0 12px 25px -8px rgba(245,176,65,0.4);
    }
    .mode-toggle {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: #1a1a2e;
      color: #f5b041;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 26px;
      z-index: 100;
      border: none;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      transition: all 0.2s;
    }
    .mode-toggle:hover {
      background: #f5b041;
      color: #1a1a2e;
      transform: scale(1.05);
    }
    .footer-note {
      text-align: center;
      margin-top: 28px;
      font-size: 12px;
      color: #94a3b8;
    }
    @media (max-width: 550px) {
      .login-card { padding: 32px 24px; }
      .row-2 { grid-template-columns: 1fr; gap: 0; }
      h1 { font-size: 24px; }
    }
  </style>
</head>
<body>
<div class="bg-shape" id="bgShapes"></div>
<div class="login-card">
  <div class="logo-area">
    <img class="logo-img" src="https://i.ibb.co/v6TBWQF7/1779439519874-5afe5a49-b538-4888-abbc-b0142eeca273.png" alt="شعار المنصة">
  </div>
  <h1>منصة الثانوية الرسمية بلس</h1>
  <div class="subtitle">سجل دخولك لبدء رحلة التفوق</div>
  <form id="loginForm">
    <div class="input-group">
      <label><i class="fas fa-user-graduate"></i> الاسم كاملاً (ثلاثي)</label>
      <input type="text" id="studentName" placeholder="مثال: أحمد محمد علي" required>
    </div>
    <div class="row-2">
      <div class="input-group"><label><i class="fas fa-graduation-cap"></i> الصف الدراسي</label><select id="studentGrade"><option value="اولى ثانوي">📘 أولى ثانوي</option><option value="تانية ثانوي" selected>📙 تانية ثانوي</option><option value="تالتة ثانوي">📕 تالتة ثانوي</option></select></div>
      <div class="input-group"><label><i class="fas fa-chart-line"></i> الشعبة</label><select id="studentSection"><option value="علمي">🔬 علمي</option><option value="ادبي">📖 أدبي</option></select></div>
    </div>
    <div class="row-2">
      <div class="input-group"><label><i class="fas fa-venus-mars"></i> الجنس</label><select id="studentGender"><option value="ذكر">ذكر</option><option value="أنثى">أنثى</option></select></div>
      <div class="input-group"><label><i class="fas fa-mosque"></i> النوع</label><select id="studentType"><option value="عام">عام</option><option value="أزهري">أزهري</option></select></div>
    </div>
    <button type="submit" class="btn-login"><i class="fas fa-sign-in-alt"></i> دخول</button>
    <div class="footer-note">منصة تعليمية متكاملة | جميع الحقوق محفوظة</div>
  </form>
</div>
<button class="mode-toggle" id="darkModeToggle"><i class="fas fa-moon"></i></button>

<script>
  // ========================== خلفية متحركة ==========================
  function createShapes() {
    const container = document.getElementById('bgShapes');
    for(let i = 0; i < 35; i++) {
      let span = document.createElement('span');
      let size = Math.random() * 180 + 30;
      span.style.width = size + 'px';
      span.style.height = size + 'px';
      span.style.left = Math.random() * 100 + '%';
      span.style.animationDuration = Math.random() * 20 + 15 + 's';
      span.style.animationDelay = Math.random() * 10 + 's';
      span.style.background = 'rgba(245, 176, 65, 0.04)';
      container.appendChild(span);
    }
  }
  createShapes();

  // ========================== التحقق من الجلسة ==========================
  if(localStorage.getItem('currentStudent')) {
    window.location.href = 'student.html';
  }

  // ========================== تسجيل الدخول ==========================
  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const nameInput = document.getElementById('studentName');
    if(!nameInput.value.trim()) {
      alert('❌ من فضلك أدخل اسمك بالكامل');
      nameInput.style.borderColor = '#ef4444';
      setTimeout(() => nameInput.style.borderColor = '', 1500);
      return;
    }
    const studentData = {
      id: Date.now() + '_' + Math.random(),
      name: nameInput.value.trim(),
      grade: document.getElementById('studentGrade').value,
      section: document.getElementById('studentSection').value,
      gender: document.getElementById('studentGender').value,
      type: document.getElementById('studentType').value,
      loginTime: new Date().toISOString(),
      date: new Date().toDateString(),
      lastActive: new Date().toLocaleString()
    };
    localStorage.setItem('currentStudent', JSON.stringify(studentData));
    let allStudents = JSON.parse(localStorage.getItem('allStudents')) || [];
    allStudents.push(studentData);
    localStorage.setItem('allStudents', JSON.stringify(allStudents));
    let todayLogins = JSON.parse(localStorage.getItem('todayLogins')) || [];
    todayLogins.push({ name: studentData.name, time: new Date().toLocaleString(), grade: studentData.grade });
    localStorage.setItem('todayLogins', JSON.stringify(todayLogins));
    window.location.href = 'student.html';
  });

  // ========================== الوضع الليلي ==========================
  let darkMode = localStorage.getItem('darkMode') === 'true';
  function applyTheme() {
    if(darkMode) {
      document.body.classList.add('dark');
      document.getElementById('darkModeToggle').innerHTML = '<i class="fas fa-sun"></i>';
    } else {
      document.body.classList.remove('dark');
      document.getElementById('darkModeToggle').innerHTML = '<i class="fas fa-moon"></i>';
    }
  }
  applyTheme();
  document.getElementById('darkModeToggle').addEventListener('click', () => {
    darkMode = !darkMode;
    localStorage.setItem('darkMode', darkMode);
    applyTheme();
  });
</script>
</body>
</html>

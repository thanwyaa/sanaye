<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول - منصة الثانوية الرسمية بلس</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Tajawal', sans-serif;
      background: linear-gradient(135deg, #ffffff 0%, #f5f5f5 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-card {
      background: #ffffff;
      border-radius: 32px;
      padding: 48px 40px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
      border: 1px solid #e2e8f0;
    }
    .logo-area { text-align: center; margin-bottom: 24px; }
    .logo-img { width: 80px; height: 80px; border-radius: 20px; object-fit: cover; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
    h1 { text-align: center; color: #1a1a2e; font-size: 28px; font-weight: 800; margin-top: 12px; }
    .subtitle { text-align: center; color: #64748b; margin-bottom: 32px; font-size: 14px; }
    .input-group { margin-bottom: 20px; }
    .input-group label { display: block; color: #1a1a2e; font-weight: 600; margin-bottom: 8px; font-size: 14px; }
    .input-group input, .input-group select {
      width: 100%;
      padding: 14px 16px;
      background: #f8fafc;
      border: 1.5px solid #e2e8f0;
      border-radius: 16px;
      font-size: 15px;
      font-family: 'Tajawal', sans-serif;
      color: #1a1a2e;
      transition: all 0.3s;
    }
    .input-group input:focus, .input-group select:focus { outline: none; border-color: #f5b041; box-shadow: 0 0 0 3px rgba(245,176,65,0.1); }
    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .btn-login {
      width: 100%;
      padding: 16px;
      background: #1a1a2e;
      color: #ffffff;
      border: none;
      border-radius: 40px;
      font-size: 18px;
      font-weight: 700;
      font-family: 'Tajawal', sans-serif;
      cursor: pointer;
      margin-top: 16px;
      transition: all 0.3s;
    }
    .btn-login:hover { background: #f5b041; color: #1a1a2e; transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(245,176,65,0.3); }
    @media (max-width: 550px) { .login-card { padding: 32px 24px; } .row-2 { grid-template-columns: 1fr; gap: 0; } h1 { font-size: 24px; } }
  </style>
</head>
<body>
<div class="login-card">
  <div class="logo-area">
    <img class="logo-img" src="https://i.ibb.co/v6TBWQF7/1779439519874-5afe5a49-b538-4888-abbc-b0142eeca273.png" alt="شعار المنصة">
  </div>
  <h1>منصة الثانوية الرسمية بلس</h1>
  <div class="subtitle">مرحباً بك.. سجل دخولك للمنصة</div>
  <form id="loginForm">
    <div class="input-group"><label><i class="fas fa-user"></i> الاسم كاملاً</label><input type="text" id="studentName" placeholder="مثال: أحمد محمد علي" required></div>
    <div class="row-2">
      <div class="input-group"><label><i class="fas fa-graduation-cap"></i> الصف</label><select id="studentGrade"><option value="اولى ثانوي">أولى ثانوي</option><option value="تانية ثانوي" selected>تانية ثانوي</option><option value="تالتة ثانوي">تالتة ثانوي</option></select></div>
      <div class="input-group"><label><i class="fas fa-chart-line"></i> الشعبة</label><select id="studentSection"><option value="علمي">علمي</option><option value="ادبي">أدبي</option></select></div>
    </div>
    <div class="row-2">
      <div class="input-group"><label><i class="fas fa-venus-mars"></i> الجنس</label><select id="studentGender"><option value="ذكر">ذكر</option><option value="انثى">أنثى</option></select></div>
      <div class="input-group"><label><i class="fas fa-mosque"></i> النوع</label><select id="studentType"><option value="عام">عام</option><option value="ازهري">أزهري</option></select></div>
    </div>
    <button type="submit" class="btn-login"><i class="fas fa-sign-in-alt"></i> دخول</button>
  </form>
</div>
<script>
  if(localStorage.getItem('currentStudent')) window.location.href = 'student.html';
  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const studentData = {
      name: document.getElementById('studentName').value,
      grade: document.getElementById('studentGrade').value,
      section: document.getElementById('studentSection').value,
      gender: document.getElementById('studentGender').value,
      type: document.getElementById('studentType').value,
      loginTime: new Date().toISOString(),
      date: new Date().toDateString()
    };
    if(!studentData.name.trim()) { alert('من فضلك أدخل اسمك'); return; }
    localStorage.setItem('currentStudent', JSON.stringify(studentData));
    let allStudents = JSON.parse(localStorage.getItem('allStudents')) || [];
    allStudents.push(studentData);
    localStorage.setItem('allStudents', JSON.stringify(allStudents));
    let todayLogins = JSON.parse(localStorage.getItem('todayLogins')) || [];
    todayLogins.push({ name: studentData.name, time: new Date().toLocaleString(), grade: studentData.grade });
    localStorage.setItem('todayLogins', JSON.stringify(todayLogins));
    window.location.href = 'student.html';
  });
</script>
</body>
</html>
